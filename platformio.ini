; Environments built in CI (build-firmware.yml workflow_dispatch default,
; release.yml tag builds). Whitespace/newline-separated. Workflows parse this
; via configparser — see .github/workflows/*.yml setup job.
; Not a PlatformIO section — PlatformIO ignores unknown sections.
[ci]
envs =
    m5stack-nanoc6
    esp32p4_waveshare_devkit

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
platform_packages =
framework = arduino

board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.mcu = esp32
board_build.flash_mode = dio
; https://github.com/espressif/arduino-esp32/tree/master/tools/partitions
; board_build.partitions = no_ota.csv

monitor_speed = 115200
; monitor_filters = time
upload_speed = 1500000
build_flags =
	-w
    -O2 -g
	; -DPICOWEBSOCKET_MAX_HTTP_LINE_LENGTH=512
    ; -DARDUINO_LOOP_STACK_SIZE=16384
    ; -DHOSTNAME=\"sensorpod\"
    ; -DMQTT_PORT=1883
    ; -DMQTTWS_PORT=8883
	; SGO_DEFAULT_OWNER, SGO_DEFAULT_REPO, SGO_DEFAULT_BIN are auto-injected
	; by scripts/inject_build_info.py (owner/repo from git remote, bin from
	; firmware_naming.ota_bin_filename). Override here if needed:
	; -DSGO_DEFAULT_PAT=\"${sysenv.SGO_DEFAULT_PAT}\"
    ; -DSGO_DEFAULT_OWNER=\"${sysenv.SGO_DEFAULT_OWNER}\"
	; -DSGO_DEFAULT_REPO=\"${sysenv.SGO_DEFAULT_REPO}\"
	; -DSGO_DEFAULT_BIN=\"${sysenv.SGO_DEFAULT_BIN}\"
lib_deps =
    ; https://github.com/bblanchon/ArduinoJson.git
    ; https://github.com/mathertel/OneButton.git
    ; https://github.com/mhaberler/Improv-WiFi-Library.git
    ; https://github.com/adafruit/Adafruit_VL53L0X.git
	; https://github.com/mlesniew/PicoMQTT
	; https://github.com/mlesniew/PicoWebsocket
    ; https://github.com/gibz104/SafeGithubOTA.git#0.1.1

lib_ldf_mode = deep


; upload_port = COM16
; monitor_port = ${env.upload_port}

; extra_scripts =
;     pre:scripts/inject_build_info.py
;     scripts/inject_lib_versions.py
;     post:scripts/generate_merged_firmware.py
;     post:scripts/bump_version.py

custom_inject_lib_versions = "Improv WiFi Library" OneButton ArduinoJson Adafruit_VL53L0X \
    PicoMQTT PicoWebsocket


; Optional: Project name used in the firmware filename.
; If omitted, the project directory name is used.
; custom_firmware_name = my_project

; Optional: Firmware version used in the firmware filename.
; custom_firmware_version has priority when specified.
; Otherwise, the version can be extracted from a file using regex.
; If neither is specified, the GitHub tag name is used when available, or "dev".
;
; custom_firmware_version = 1.2.3
; custom_firmware_version_file = main.cpp
; custom_firmware_version_regex = "v(\d+\.\d+\.\d+)"
custom_firmware_dir = firmware

; how do you want checks to be made?
; comment out undesired options.
[ghota]
build_flags =
    ; -DGITHUB_OTA
    ; -DAUTOCHECK_INTERVAL=21600 ; Auto-check for release updates every 6 hours
    ; -DAUTOCHECK_POST_BOOT      ; Auto-check once post-boot once IP address has been acquired

[improv]
build_flags =
    -DIMPROV_WIFI_BLE_ENABLED

[ota]
build_flags =
    -DOTA_WEB_UPDATER

; if you really need to compile in WiFi credentials this can be done here
; not recommended

[build-target]
; extends = release
extends = debug

[release]
build_type = release
build_flags =
    ${env.build_flags}
    ${improv.build_flags}
    ${ghota.build_flags}
    ${ota.build_flags}
    ${env.build_flags}
    -DCORE_DEBUG_LEVEL=2

[debug]
build_type = debug
build_flags =
    ${env.build_flags}
    ; ${improv.build_flags}
    ; ${ghota.build_flags}
    ; ${ota.build_flags}
    -DCORE_DEBUG_LEVEL=3 ;  -DDEBUG

debug_tool = esp-builtin

[module-llm]
build_flags =
    ${env.build_flags}
    -DUSE_MODULE_LLM
lib_deps =
    M5Module-LLM

[env:m5stack-basic]
extends = m5stack-basic-16MB, build-target
build_flags =
    ${m5stack-basic-16MB.build_flags}
    ${build-target.build_flags}
    -DUSE_M5STACK_OFFICIAL
lib_deps =
    ${env.lib_deps}
    ${m5stack-basic-16MB.lib_deps}
    m5stack/M5Stack

[env:m5stack-basic-m5unified]
extends = m5stack-basic-16MB, m5unified, build-target
build_flags =
    ${m5stack-basic-16MB.build_flags}
    ${m5unified.build_flags}
    ${build-target.build_flags}
lib_deps =
    ${m5stack-basic-16MB.lib_deps}
    ${m5unified.lib_deps}

[env:m5stack-basic-m5unified-llm]
extends = env:m5stack-basic-m5unified, module-llm, build-target
build_flags =
    ${env:m5stack-basic-m5unified.build_flags}
    ${module-llm.build_flags}
    -DLLM_UART_RX=GPIO_NUM_16
    -DLLM_UART_TX=GPIO_NUM_17
    ${build-target.build_flags}
lib_deps =
    ${env:m5stack-basic-m5unified.lib_deps}
    ${module-llm.lib_deps}

[env:m5stack-fire]
extends = m5stack-fire, build-target
build_flags =
