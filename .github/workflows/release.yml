name: Release firmware

on:
  push:
    tags:
      - "v*"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.set.outputs.envs }}
    steps:
      - uses: actions/checkout@v5
      - id: set
        run: |
          python - >> "$GITHUB_OUTPUT" <<'PY'
          import configparser, json
          cp = configparser.ConfigParser()
          cp.read("platformio.ini")
          envs = cp.get("ci", "envs").split()
          print(f"envs={json.dumps(envs)}")
          PY

  build:
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        platformio_env: ${{ fromJSON(needs.setup.outputs.envs) }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-platformio
          restore-keys: ${{ runner.os }}-pip-

      - uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'platformio-m5stack.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Clean firmware directory
        run: rm -rf firmware && mkdir -p firmware

      - name: Build merged firmware
        run: pio run -e ${{ matrix.platformio_env }} -t firmware

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.platformio_env }}
          path: firmware/*.bin
          if-no-files-found: error

  release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v8
        with:
          path: firmware
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: firmware/*.bin
          generate_release_notes: true
